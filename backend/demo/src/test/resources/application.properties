# --- Test profile properties ---
# 本番アプリの application.properties を継承しつつ、
# テスト時に外部依存 (OpenAI 等) を切り離すための上書き設定。

spring.application.name=sakeec
spring.docker.compose.enabled=false

# H2 in-memory (本番と同 MySQL モード)
spring.datasource.url=jdbc:h2:mem:sake-test;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# JWT (テスト用ダミー値)
app.jwt.secret=test-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-test
app.jwt.expiration-ms=3600000

# Spring AI: テストでは外部APIに到達しないよう全モデルを無効化
spring.ai.model.chat=none
spring.ai.model.embedding=none
spring.ai.model.audio.speech=none
spring.ai.model.audio.transcription=none
spring.ai.model.image=none
spring.ai.model.moderation=none
spring.ai.openai.api-key=test-dummy

logging.level.root=WARN
logging.level.com.example.sakeec=INFO
