openapi: 3.0.3
info:
  title: Sake EC API
  version: 1.0.0
servers:
  - url: http://localhost:8080

components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: integer
        imageUrl:
          type: string
    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    ValidationErrorResponse:
      type: object
      required: [message, errors]
      properties:
        message:
          type: string
          example: validation error
        errors:
          type: object
          description: "キー=フィールド名、値=エラーメッセージ配列"
          additionalProperties:
            type: array
            items:
              type: string
  responses:
    BadRequest:
      description: Bad Request(validation error)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
          example:
            message: validation error
            errors:
              username:
                - username is required
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: unauthorized
    NotFoundProduct:
      description: Product not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: product not found
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: internal server error
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /api/products:
    get:
      summary: 商品一覧取得
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: 商品名での部分一致検索
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
          description: ページ番号
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: 1ページあたりの件数
      responses:
        '200':
          description: 商品一覧取得成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFoundProduct'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/products/{id}:
    get:
      summary: 商品詳細取得
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 商品取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          $ref: '#/components/responses/NotFoundProduct'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/products:
    post:
      summary: 商品管理(管理)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - price
              properties:
                name:
                  type: string
                price:
                  type: integer
                imageUrl:
                  type: string
      responses:
        '201':
          description: 商品登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
