spring.application.name=sakeec
spring.docker.compose.enabled=false

# --- Logging ---
# 本番想定: アプリは INFO、フレームワークはノイズを抑制
# (ロガー別の細かい設定は logback-spring.xml を参照)
# 出力先と環境名は環境変数 LOG_DIR / APP_ENV で切替可能
# (未設定時は logback-spring.xml のデフォルト値 logs / dev が使われる)
logging.level.root=INFO
logging.level.com.example.sakeec=INFO

# H2 (dev)
spring.datasource.url=jdbc:h2:mem:sake;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
# data の初期投入は DevAdminInitializer (ApplicationRunner) で行う

# JWT
app.jwt.secret=sakeec-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
app.jwt.expiration-ms=86400000
