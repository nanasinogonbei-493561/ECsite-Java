openapi: 3.0.3
info:
  title: Sake EC API
  version: 1.0.0
servers:
  - url: http://localhost:8080


components:
  securitySchemes:
    bearerAuth:
      type: http
      schema: bearer
      bearerFormat: JWT

schemes:
  Product:
    type: object
    required: [id, name, price, imageUrl]
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
        minLength: 1
        maxLength: 100
      price:
        type: integer
        format: int32
        minimum: 1
        maximum: 999999
      imageUrl:
        type: string

ProductCreateRequest:
  type: object
  required: [name, price]
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 100
    price:
      type: integer
      minimum: 1
      maximum: 999999
    imageUrl:
      type: string
      maxLength: 255


ProductUpdateRequest:
  type: object
  required: [name, price]
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 100
    price:
      type: integer
      minimum: 1
      maximum: 999999
    imageUrl:
      type: string
      maxLength: 255


ErrorResponse:
  type: object
  required: [message]
  properties:
    message:
      type: string


paths:
  /api/admin/products:
    get:
      summary: 商品一覧(管理)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          scheme:
            type: string
          required: false
          description: 商品名の部分一致検索
        - in: query
          name: limit
          schema:
            type: integer
            maximum: 30
          required: false
          description: 取得件数(未指定時30、最大30)
response:
  '200':
    description: 商品一覧
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: '#/components/schemas/Product'
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/ErrorResponse'


post:
  summary: 商品登録(管理)
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/ProductCreateRequest'
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Product'
    '400':
      description: Bad Request(validation error)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'


/api/admin/products/{id}:
  put:
    summary: 商品更新(管理)
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
        description: 更新対象の商品ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProductUpdateRequest'
    responses:
      '200':
        description: Updated
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      '400':
        description: Bad Request (validation error)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Not Found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  delete:
    summary: 商品削除 (管理)
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
        description: 削除対象の商品ID
    responses:
      '204':
        description: No Content
      '401':
        description: Unauthorized
        content:
          application/json:
            $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Not Found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'